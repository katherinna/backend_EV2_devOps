version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: innovatech-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - backend-net

  ventas:
    build:
      context: .
      dockerfile: Dockerfile-ventas
    image: Katherinna/innovatech-ventas:latest
    container_name: innovatech-ventas
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - backend-net

  despachos:
    build:
      context: .
      dockerfile: Dockerfile-despachos
    image: Katherinna/innovatech-despachos:latest
    container_name: innovatech-despachos
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - backend-net

volumes:
  dbdata:

networks:
  backend-net:
    driver: bridge